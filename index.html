<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel Dokumentów</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f2f4f8;
}

header{
    background:#1e3a8a;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

.container{
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{
    margin-top:0;
}

.btn{
    display:inline-block;
    padding:10px 15px;
    background:#2563eb;
    color:white;
    border-radius:8px;
    text-decoration:none;
    margin-top:10px;
}

.profile{
    display:flex;
    align-items:center;
    gap:15px;
}

.avatar{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#ddd;
}
</style>
</head>

<body>

<header>
Panel obywatela (demo)
</header>

<div class="container">

<div class="card profile">
<div class="avatar"></div>
<div>
<strong>Jan Kowalski</strong><br>
Status: aktywny użytkownik
</div>
</div>

<div class="card">
<h3>Dowód osobisty</h3>
<p>Numer dokumentu: XXX123456</p>
<a class="btn">Pokaż</a>
</div>

<div class="card">
<h3>Prawo jazdy</h3>
<p>Kategoria: B</p>
<a class="btn">Szczegóły</a>
</div>

<div class="card">
<h3>Pojazdy</h3>
<p>1 zarejestrowany pojazd</p>
<a class="btn">Zobacz</a>
</div>

</div>

</body>
</html>
